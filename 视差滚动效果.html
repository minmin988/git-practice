<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视差滚动效果</title>
  <link rel="stylesheet" href="date.css">
  <style>
    .top-nav {
      width: 100%;
      height: 72px;
      display: flex;
      /* 左右导航贴边，中间 Logo 居中
      justify-content: space-between; */
      /* 垂直居中 */
      align-items: center;
      position: fixed;
      z-index: 99;
      color: #000;
    }

    /* 默认样式（所有屏幕先继承） */
    .brand-logo {
      margin: 0 auto;
      display: flex;
      justify-content: center;
      /* 标准 Flex 水平居中：子元素沿主轴（水平）居中 */
      align-items: center;
      /* 标准 Flex 垂直居中：子元素沿交叉轴（垂直）居中 */
      width: 7.625rem;
      height: 1.75rem;
      transition: color 0.25s linear;
    }

    /* 大屏（桌面，≥1440px） */
    @media screen and (min-width: 1440px) {
      .brand-logo {
        width: 8.625rem;
        height: 1.9375rem;
      }
    }

    /* 左右导航通用样式 */
    .nav-left ul,
    .nav-right ul {
      position: absolute;
      /* 脱离 Flex 文档流，不影响 logo 居中 */
      display: flex;
      /* 导航项之间的间距 */
      align-items: center;
      /* 垂直居中（适配图标） */
      top: 50%;
      /* 先定位到容器垂直中点 */
      transform: translateY(-50%);
      /* 向上偏移自身高度的 50%，实现精准垂直居中 */
    }

    .nav-left ul {
      left: 20px;
    }

    .nav-right ul {
      right: 20px;

    }

    .nav-left ul li,
    .nav-right ul li {
      display: flex;
      align-items: center;
    }

    .nav-right ul li button {
      display: flex;
      color: inherit;
      padding: 4px 12px;
      align-items: center;
    }

    .nav-right ul li button svg path {
      stroke: currentcolor;
    }

    .nav-left a,
    .nav-right a {
      padding: 0 12px;
      color: inherit;
      text-decoration: none;
      font-family: 'Helvetica_Reg';
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      /* 统一大写 */
      text-transform: uppercase;
      /* 字母间距，还原品牌风格 */
      letter-spacing: -0.2px;
      transition: opacity 0.2s;
    }

    .nav-left a:hover,
    .nav-right a:hover,
    .brand-logo:hover {
      opacity: 0.5;
      /*  hover 时轻微透明 */
    }

    /* RIVE DROITE 前的方块样式 */
    .rive-droite span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: currentColor;
      margin: 0 4px 0 0;
    }

    .container {
      width: 100%;
      height: 100%;
    }

    .container [attr^="box"] {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .container [attr^="box"] img {
      position: relative;
      z-index: 1;
      width: 100%;
      /* 图片宽度铺满容器 */
      height: 100%;
      /* 图片高度铺满容器 */
      object-fit: cover;
      /* 核心：保持图片比例，填充容器，超出部分裁切 */
      object-position: center;
      /* 可选：控制图片裁切的锚点（默认居中，可设 top/left/bottom/right 等） */
    }
  </style>
</head>

    </div>
