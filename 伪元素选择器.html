<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../base.css">
  <style>
    .box {
      height: 100%;
      width: 100%;
      background-color: rgb(88, 143, 76);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .box::before {
      content: '';
      display: block;
      position: absolute;
      top: 50%;
      left: 10%;
      transform: translate(-50%, -50%);
      height: 100px;
      width: 100px;
      background-color: rgb(255, 255, 255);
    }

    .box::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 90%;
      transform: translate(-50%, -50%);
      height: 100px;
      width: 100px;
      background-color: rgb(255, 255, 255);
    }
  </style>
</head>

<body>
  <div class="box">
    <h1 class="title">hello world</h1>
  </div>
</body>

</html>
