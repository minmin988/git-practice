<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../base.css">
  <style>
    .box {
      display: flex;
      justify-content: center;
      text-align: center;
      line-height: 200px;
      color: #fff;
      gap: 4px;
      height: 200px;
      width: auto;
      margin: 200px auto;
    }

    .box>* {
      background-color: rgb(85, 165, 67);
      height: 200px;
      width: 200px;
      border-radius: 16px;
      -webkit-box-reflect: below 4px linear-gradient(transparent, transparent, #0004);
      transition: all 0.3s ease-in-out;
    }

    .box>*:hover {
      transform: scale(1.2);
      background-color: rgb(149, 165, 67);
      z-index: 99;
    }

    /* 鼠标经过的盒子不变，其余的盒子修改 */
    .box:hover>*:not(:hover) {
      transform: perspective(500px) scale(0.9) rotateY(30deg);
      margin: 0 -40px;
    }

    /* 鼠标经过的盒子，后面的兄弟盒子修改 */
    .box .item:hover~.item {
      transform: perspective(500px) scale(0.9) rotateY(-30deg);
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
  </div>
</body>

</html>
